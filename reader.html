<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>纯净阅读 X推文- 唯美 Blog 模式</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f7f9fa;
      color: #0f1419;
      margin: 0;
      padding: 50px 20px;
      display: flex;
      justify-content: center;
    }

    #blog-container {
      width: 100%;
      max-width: 650px;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .page-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px dashed #eff3f4;
      color: #536471;
      font-size: 0.9em;
      line-height: 1.8;
      word-break: break-all;
    }

    .page-header a {
      color: #1d9bf0;
      text-decoration: none;
    }

    .tweet-card {
      padding: 7px 0;
      border-bottom: 1px solid #eff3f4;
    }

    .tweet-card:last-child {
      border-bottom: none;
    }

    .author-section {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .author-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 12px;
      object-fit: cover;
      background-color: #eff3f4;
    }

    .author-info {
      display: flex;
      flex-direction: column;
    }

    .author-name {
      font-weight: bold;
      color: #0f1419;
      font-size: 1.05em;
    }

    .author-handle {
      color: #536471;
      font-size: 0.9em;
    }

    .tweet-text {
      font-size: 1.1em;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #0f1419 !important;
    }

    .tweet-text * {
      color: #0f1419 !important;
      background-image: none !important;
      -webkit-text-fill-color: #0f1419 !important;
      opacity: 1 !important;
    }

    .tweet-text a,
    .tweet-text a * {
      color: #1d9bf0 !important;
      text-decoration: none;
    }

    .tweet-text img {
      height: 1.2em;
      width: 1.2em;
      vertical-align: -0.2em;
    }

    .tweet-quotes {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quoted-tweet {
      margin: 0;
      padding: 10px 12px;
      border-left: 3px solid #1d9bf0;
      border-radius: 8px;
      background: #f8fbff;
      color: #334155;
      font-size: 0.95em;
    }

    .quoted-text {
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }

    .quoted-media {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .tweet-media {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .tweet-media img,
    .quoted-media img {
      width: auto;
      max-width: 80%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .video-card,
    .link-card {
      width: min(80%, 520px);
      margin: 0;
      background: #f3f5f7;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e5eaf0;
    }

    .video-thumb,
    .link-card-thumb {
      width: 100% !important;
      max-width: none !important;
      border-radius: 0 !important;
    }

    .video-meta,
    .link-card-title {
      padding: 8px 10px;
      color: #334155;
      font-size: 0.9em;
      font-weight: 600;
      text-align: right;
      background: #ffffff;
    }

    .link-card-title {
      text-align: left;
    }

    .main-tweet .tweet-text {
      font-size: 1.25em;
    }

    .comments-toggle {
      width: 100%;
      height: 15px;
      background-color: #ffffff;
      margin: 3px 0;
      cursor: pointer;
      border-radius: 2px;
      transition: transform 0.2s, background-color 0.2s;
      position: relative;
    }

    .comments-toggle:hover {
      background-color: #1d9bf0;
      transform: scaleY(1.5);
    }

    .comments-toggle::after {
      content: "点击隐藏/展开后续评论";
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #536471;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .comments-toggle:hover::after {
      opacity: 1;
    }

    #comments-container {
      display: block;
    }
  </style>
</head>
<body>
  <div id="blog-container">正在提取内容...</div>
  <script src="reader.js"></script>
</body>
</html>
